<!DOCTYPE html><html><head><meta charset="utf-8"><title>VN S5</title>
<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { background:#0a0a0f; font-family:'Courier New',monospace; overflow:hidden; }
.vn { position:relative; width:100vw; height:100vh; overflow:hidden; }
.vn-bg { position:absolute;inset:0;background-image:url('sprites/nebula_blue.png');background-size:cover;background-position:center; }
.vn::after { content:"";position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.6) 0%,rgba(0,0,0,.1) 60%,rgba(0,0,0,0) 100%); }
.vn-char { position:absolute;top:4%;width:28%;aspect-ratio:3/4;background-size:cover;border-radius:6px;border:2px solid #b48aff;z-index:2;left:50%;transform:translateX(-50%);background-image:url('sprites/nox_leader.png');background-position:32% 8%;background-size:auto 140%;box-shadow:0 10px 40px rgba(0,0,0,.65),0 0 26px #b48aff55; }
.vn-box { position:absolute;bottom:0;left:0;right:0;padding:18px 22px 20px;background:linear-gradient(to top,rgba(4,8,16,.97) 0%,rgba(4,8,16,.88) 70%,rgba(4,8,16,0) 100%);z-index:3;min-height:28%; }
.vn-speaker { font-size:14px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;color:#b48aff; }
.vn-text { font-size:15px;line-height:1.6;color:#dce8ff;max-width:72%; }
.vn-hint { position:absolute;bottom:10px;right:16px;font-size:10px;color:#4a6080;z-index:4;animation:blink 1.4s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.vn-skip { position:absolute;top:10px;right:14px;font-size:10px;color:#3a5060;letter-spacing:1.5px;text-transform:uppercase;z-index:5;background:rgba(0,0,0,.4);padding:4px 8px;border-radius:3px;border:1px solid #1e3040; }
.lbl { position:absolute;top:10px;left:14px;font-size:9px;color:#4a6080;letter-spacing:2px;text-transform:uppercase;z-index:5; }
</style></head><body>
<div class="vn">
  <div class="vn-bg"></div>
  <div class="vn-char"></div>
  <div class="lbl">Nox · Scene 6 — Handler Sive portrait (center), closing offer</div>
  <div class="vn-skip">SKIP</div>
  <div class="vn-box">
    <div class="vn-speaker">SIVE</div>
    <div class="vn-text">Fly well. We will be watching our investment appreciate.</div>
  </div>
  <div class="vn-hint">▶ tap to advance</div>
</div></body></html>
