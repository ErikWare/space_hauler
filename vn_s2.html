<!DOCTYPE html><html><head><meta charset="utf-8"><title>VN S2</title>
<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { background:#0a0a0f; font-family:'Courier New',monospace; overflow:hidden; }
.vn { position:relative; width:100vw; height:100vh; overflow:hidden; }
.vn-bg { position:absolute;inset:0;background-image:url('sprites/opening_scene.png');background-size:cover;background-position:center; }
.vn::after { content:"";position:absolute;inset:0;background:rgba(0,0,0,0.52); }
.vn-box { position:absolute;bottom:0;left:0;right:0;padding:18px 22px 20px;background:linear-gradient(to top,rgba(4,8,16,.97) 0%,rgba(4,8,16,.88) 70%,rgba(4,8,16,0) 100%);z-index:3;min-height:28%; }
.vn-speaker { font-size:14px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;color:#57d1c9; }
.vn-text { font-size:15px;line-height:1.6;color:#dce8ff;max-width:72%; }
.vn-choices { position:absolute;bottom:18px;left:0;right:0;display:flex;flex-direction:column;align-items:flex-start;gap:8px;padding:0 22px;z-index:4; }
.vn-choice { background:rgba(8,20,40,.88);border:1px solid #2a4a70;border-radius:4px;color:#8fd0ff;font-family:'Courier New',monospace;font-size:13px;letter-spacing:.5px;padding:8px 16px; }
.vn-skip { position:absolute;top:10px;right:14px;font-size:10px;color:#3a5060;letter-spacing:1.5px;text-transform:uppercase;z-index:5;background:rgba(0,0,0,.4);padding:4px 8px;border-radius:3px;border:1px solid #1e3040; }
.lbl { position:absolute;top:10px;left:14px;font-size:9px;color:#4a6080;letter-spacing:2px;text-transform:uppercase;z-index:5; }
</style></head><body>
<div class="vn">
  <div class="vn-bg"></div>
  <div class="lbl">Krag · Scene 2 — Player voice + choice point</div>
  <div class="vn-skip">SKIP</div>
  <div class="vn-box">
    <div class="vn-speaker">YOU</div>
    <div class="vn-text">Come on, old girl. Don't die in the dark.</div>
  </div>
  <div class="vn-choices">
    <button class="vn-choice">Dump the salvage. Run empty, run alive.</button>
    <button class="vn-choice">Keep the load. Outrun them heavy.</button>
  </div>
</div></body></html>
